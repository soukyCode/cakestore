<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>

    <header>
        <h1>Contact Us</h1>
    </header>

    <section class="contact-container">

        <!-- Contact Info -->
        <div class="contact-info">
            <h2>Get in Touch</h2>

            <p><strong>📍 Address:</strong> Souky’s Cakes Shop,Miami USA </p>
            <p><strong>📞 Phone:</strong> +1 305 555 2489</p>
            <p><strong>📧 Email:</strong> soukyscakes95@gmail.com</p>
        </div>

        <!-- Contact Form -->
        <form class="contact-form">

            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Your name..." required>

            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Your email..." required>

            <label for="message">Message</label>
            <textarea id="message" rows="6" placeholder="Type your message..." required></textarea>

            <button type="submit">Send Message</button>

        </form>

    </section>

</body>
</html>
